# LubanRDS 配置文件
# 参考 Redis 配置格式

################################## 网络配置 ##################################

# 绑定地址，默认绑定所有网卡
bind 0.0.0.0

# 监听端口，默认 9736
port 9736

# TCP 连接队列长度
tcp-backlog 511

# 客户端空闲超时时间（秒），0 表示禁用
timeout 0

# TCP keepalive 时间（秒）
tcp-keepalive 300

################################## 通用配置 ##################################

# 是否以守护进程方式运行
daemonize no

# 日志级别：debug, verbose, notice, warning
loglevel notice

# 日志文件路径，空字符串表示输出到标准输出
logfile ""

# 数据库数量
databases 16

################################## 持久化配置 ##################################

# 持久化模式：rdb, aof, mixed, none
# rdb - 使用 RDB 快照持久化
# aof - 使用 AOF 日志持久化
# mixed - 同时使用 RDB 和 AOF
# none - 不进行持久化
persist-mode rdb

# 数据目录
dir ./data

# RDB 文件名
dbfilename dump.rdb

# RDB 自动保存间隔（秒）
rdb-save-interval 60

# AOF 文件名
appendfilename appendonly.aof

# AOF 同步策略：always, everysec, no
# always - 每次写入都同步
# everysec - 每秒同步一次
# no - 由操作系统决定何时同步
appendfsync everysec

# AOF 同步间隔（秒），仅当 appendfsync 为 everysec 时有效
aof-fsync-interval 1

################################## 内存管理 ##################################

# 最大内存限制，0 表示不限制
# 支持单位：b, kb, mb, gb
maxmemory 0

# 内存淘汰策略
# noeviction - 不淘汰，内存满时返回错误
# allkeys-lru - 从所有键中淘汰最近最少使用的
# volatile-lru - 从设置了过期时间的键中淘汰最近最少使用的
# allkeys-random - 从所有键中随机淘汰
# volatile-random - 从设置了过期时间的键中随机淘汰
# volatile-ttl - 从设置了过期时间的键中淘汰即将过期的
maxmemory-policy noeviction

################################## 安全配置 ##################################

# 访问密码，空字符串表示不需要密码
requirepass ""
