# .github/workflows/deploy.yml
name: Deploy VitePress to GitHub Pages

# 触发条件：推送到 master 分支，且仅监听 docs 目录变更（减少不必要的触发）
on:
  push:
    branches: [master]
    paths:
      - 'docs/**'  # 仅当 docs 目录内容变更时触发部署

# 权限配置：允许读写仓库内容、部署 Pages
permissions:
  contents: write
  pages: write
  id-token: write

# 并发控制：取消正在运行的相同任务
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      # 1. 拉取代码到运行环境
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # 拉取所有提交记录，确保最后更新时间正确

      # 2. 设置 Node.js 环境（建议使用你项目实际的 Node 版本）
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm 
          cache-dependency-path: docs/package-lock.json # 精准缓存 docs 目录的依赖

      # 3. 安装 docs 目录下的依赖（指定目录，避免根目录无 package.json 报错）
      - name: Install dependencies
        run: cd docs && npm install

      # 4. 构建 VitePress 文档（在 docs 目录执行构建）
      - name: Build VitePress site
        run: cd docs && npm run docs:build

      # 5. 配置 GitHub Pages
      - name: Setup Pages
        uses: actions/configure-pages@v4

      # 6. 上传构建产物（关键修正：路径是 docs/.vitepress/dist）
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # 修正：构建产物在 docs 目录下的 .vitepress/dist，不是根目录
          path: docs/.vitepress/dist

      # 7. 部署到 GitHub Pages
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
